version: '3.8'

services:
  marzban-panel:
    build:
      context: .
      dockerfile: Dockerfile.panel
    environment:
      - PORT=8000
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8000
      - SQLALCHEMY_DATABASE_URL=sqlite:////code/data/db.sqlite3
      - XRAY_EXECUTABLE_PATH=/usr/local/bin/xray
      - XRAY_ASSETS_PATH=/usr/local/share/xray
      - DEBUG=False
      - TZ=Asia/Tehran
      - SUDO_USERNAME=${SUDO_USERNAME:-admin}
      - SUDO_PASSWORD=${SUDO_PASSWORD:-admin123}
    volumes:
      - marzban-panel-data:/code/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  marzban-node:
    build:
      context: .
      dockerfile: Dockerfile.node
    environment:
      - SERVICE_HOST=0.0.0.0
      - SERVICE_PORT=62050
      - XRAY_API_PORT=62051
      - SERVICE_PROTOCOL=rest
      - SERVICE_TLS=false
      - SSL_DIR=/var/lib/marzban-node
      - SSL_CLIENT_CERT=${SSL_CLIENT_CERT:-}
      - XRAY_EXECUTABLE_PATH=/usr/local/bin/xray
      - XRAY_ASSETS_PATH=/usr/local/share/xray
    volumes:
      - marzban-node-data:/var/lib/marzban-node
    depends_on:
      - marzban-panel
    healthcheck:
      test: ["CMD", "python", "-c", "import socket,os; s=socket.create_connection(('127.0.0.1', int(os.getenv('SERVICE_PORT','62050'))), timeout=3); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  user-manager:
    build:
      context: ./user_manager
      dockerfile: Dockerfile
    environment:
      - PANEL_URL=http://marzban-panel:8000
      - NODE_URL=http://marzban-node:62050
      - PANEL_API_TOKEN=${PANEL_API_TOKEN}
      - PORT=8000
    ports:
      - "8080:8000"
    depends_on:
      - marzban-panel
      - marzban-node
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  marzban-panel-data:
  marzban-node-data:
