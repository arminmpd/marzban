[build]
builder = "dockercompose"
dockerComposePath = "docker-compose.railway.yml"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
XRAY_EXECUTABLE_PATH = "/usr/local/bin/xray"
XRAY_ASSETS_PATH = "/usr/local/share/xray"
SQLALCHEMY_DATABASE_URL = "sqlite:////code/data/db.sqlite3"
UVICORN_HOST = "0.0.0.0"
UVICORN_PORT = "8000"
DEBUG = "False"
TZ = "Asia/Tehran"

SUDO_USERNAME = "admin"
SUDO_PASSWORD = "admin123"

SERVICE_HOST = "0.0.0.0"
SERVICE_PORT = "62050"
XRAY_API_PORT = "62051"
SERVICE_PROTOCOL = "rest"
SERVICE_TLS = "false"
SSL_DIR = "/var/lib/marzban-node"

PANEL_API_TOKEN = ""
SSL_CLIENT_CERT = ""

[volumes]
marzban-panel-data = "/code/data"
marzban-node-data = "/var/lib/marzban-node"
